name: Deploy Docker App to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DIR: ${{ secrets.VPS_APP_DIR }}
          APP_NAME: edupoa-backend
          APP_PORT: "8085"
          SPRING_PROFILES_ACTIVE: prod
          SPRING_DATASOURCE_URL: ${{ secrets.DB_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.DB_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MPESA_APP_SECRET: ${{ secrets.MPESA_APP_SECRET }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 40m
          script_stop: true
          envs: APP_DIR,APP_NAME,APP_PORT,SPRING_PROFILES_ACTIVE,SPRING_DATASOURCE_URL,SPRING_DATASOURCE_USERNAME,SPRING_DATASOURCE_PASSWORD,JWT_SECRET_KEY,MAIL_PASSWORD,MPESA_APP_SECRET
          script: |
            set -euo pipefail

            # Default path if VPS_APP_DIR secret is not set.
            APP_DIR="${APP_DIR:-/opt/apps/backend/EduPoa/EP}"

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Deploy path is invalid (missing .git): $APP_DIR"
              exit 1
            fi

            cd "$APP_DIR"

            # Pull latest code from main safely.
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            # Build new image first to reduce downtime.
            docker build -t "$APP_NAME:latest" .

            # Replace running container.
            docker stop "$APP_NAME" || true
            docker rm "$APP_NAME" || true

            docker run -d \
              --name "$APP_NAME" \
              -p "$APP_PORT:$APP_PORT" \
              --restart unless-stopped \
              -e SPRING_PROFILES_ACTIVE="$SPRING_PROFILES_ACTIVE" \
              -e SPRING_DATASOURCE_URL="$SPRING_DATASOURCE_URL" \
              -e SPRING_DATASOURCE_USERNAME="$SPRING_DATASOURCE_USERNAME" \
              -e SPRING_DATASOURCE_PASSWORD="$SPRING_DATASOURCE_PASSWORD" \
              -e JWT_SECRET_KEY="$JWT_SECRET_KEY" \
              -e MAIL_PASSWORD="$MAIL_PASSWORD" \
              -e MPESA_APP_SECRET="$MPESA_APP_SECRET" \
              "$APP_NAME:latest"

            # Clean up unused images.
            docker image prune -f

            # Show running app container.
            docker ps --filter "name=$APP_NAME"

            echo "Deployment completed successfully!"
